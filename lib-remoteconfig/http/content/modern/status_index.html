<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/styles.css" />
<title>Status</title>
</head>
<body>
	<div id="appNav"></div>
	<div id="appHeader"></div>
	<div id="modules"></div>
	<div class="card">
		<h2>General</h2>
		<div class="row checkbox">
			<label></label> <input type="checkbox" id="display" disabled>
			<span>Display</span>
		</div>
		<div class="row checkbox">
			<label></label> <input type="checkbox" id="identify" disabled>
			<span>Identify</span>
		</div>
		<button onclick="loadGeneral()">Refresh</button>
	</div>
	<div class="card">
		<h2>Phy</h2>
		<div class="row"><label>Link</label><span id="link"></span></div>
		<div class="row"><label>Speed</label><span id="speed"></span></div>
		<div class="row"><label>Duplex</label><span id="duplex"></span></div>
		<div class="row"><label>Auto-neg</label><span id="autonegotiation"></span></div>
		<div class="row"><button onclick="loadCore('phy')">Refresh</button></div>
	</div>
	<div class="card">
		<h2>Network</h2>
		<table class="net-table">
			<thead>
				<tr>
					<th></th>
					<th>Packets</th>
					<th>Errors</th>
					<th>Drop</th>
					<th>Overrun</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>Receive</td>
					<td id="rx_ok"></td>
					<td id="rx_err"></td>
					<td id="rx_drp"></td>
					<td id="rx_ovr"></td>
				</tr>
				<tr>
					<td>Transmit</td>
					<td id="tx_ok"></td>
					<td id="tx_err"></td>
					<td id="tx_drp"></td>
					<td id="tx_ovr"></td>
				</tr>
			</tbody>
		</table>
		<div class="row">
			<button onclick="loadCore('emac')">Refresh</button>
		</div>
	</div>
	<div id="appFooter"></div>
	<div id="appActions"></div>
	<script src="/layout.js" type="text/javascript"></script>
	<script src="/status/index.js" type="text/javascript"></script>
	<script>
		bootPage('status');
		list();
		version();
		loadCores();
		loadModules();
	</script>
</body>
</html>
